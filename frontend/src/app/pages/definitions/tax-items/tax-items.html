<mat-card class="w-full">
    <div class="flex justify-between items-center p-4 border-b">
        <h2 class="text-xl font-bold m-0 text-slate-800">Vergi Kalemleri (Evrak Kodları)</h2>
        <button *ngIf="!isEditing()" mat-flat-button color="primary" (click)="startAdd()">
            <mat-icon>add</mat-icon> Yeni Ekle
        </button>
    </div>

    <mat-card-content class="p-6">
        <!-- Form Section -->
        <div *ngIf="isEditing()" class="mb-6 p-6 bg-slate-50 rounded-xl border border-slate-200">
            <h3 class="text-lg font-bold mb-4 text-slate-700">{{ currentItem().id ? 'Düzenle' : 'Yeni Ekle' }}</h3>
            <div class="flex flex-col gap-4">
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Vergi Kodu</mat-label>
                    <input matInput [(ngModel)]="currentItem().code" placeholder="Örn: 101">
                    <mat-icon matPrefix>tag</mat-icon>
                </mat-form-field>
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Vergi Kalemi Adı / Tanımı</mat-label>
                    <input matInput [(ngModel)]="currentItem().name" placeholder="Örn: Kira Geliri">
                    <mat-icon matPrefix>description</mat-icon>
                </mat-form-field>
                <div class="flex gap-3 justify-end">
                    <button mat-stroked-button (click)="cancelEdit()">İptal</button>
                    <button mat-flat-button color="primary" (click)="save()">Kaydet</button>
                </div>
            </div>
        </div>

        <!-- List Section -->
        <table mat-table [dataSource]="taxItems()" class="w-full">
            <!-- ID Column -->
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef class="w-20"> ID </th>
                <td mat-cell *matCellDef="let element" class="text-slate-500 font-mono text-xs"> #{{element.id}} </td>
            </ng-container>

            <!-- Code Column -->
            <ng-container matColumnDef="code">
                <th mat-header-cell *matHeaderCellDef class="w-32 text-center"> Kod </th>
                <td mat-cell *matCellDef="let element" class="text-center">
                    <span
                        class="font-mono text-xs bg-slate-100 px-2 py-0.5 rounded text-indigo-600 font-bold border border-indigo-100">
                        {{element.code}}
                    </span>
                </td>
            </ng-container>

            <!-- Name Column -->
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> Vergi Kalemi / Tanımı </th>
                <td mat-cell *matCellDef="let element" class="font-bold text-slate-700"> {{element.name}} </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef class="text-right w-32"> İşlemler </th>
                <td mat-cell *matCellDef="let element" class="text-right">
                    <button mat-icon-button color="primary" (click)="startEdit(element)" matTooltip="Düzenle">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="delete(element.id)" matTooltip="Sil">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="['id', 'code', 'name', 'actions']"></tr>
            <tr mat-row *matRowDef="let row; columns: ['id', 'code', 'name', 'actions'];" class="hover:bg-slate-50">
            </tr>
            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell p-8 text-center text-slate-400" colspan="4">
                    <mat-icon class="text-4xl mb-2">inbox</mat-icon>
                    <div>Kayıt bulunamadı.</div>
                </td>
            </tr>
        </table>
    </mat-card-content>
</mat-card>
